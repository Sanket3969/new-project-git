services:

  web:
    build: .
    ports:
      - "8080:3000"
    environment:
      - APP_NAME=DevOps Student
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    volumes:
      - .:/app
      - /app/node_modules  # keeps container's node_modules intact

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data   # persists data across restarts

volumes:
  redis-data:
