apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-docker-app
  labels:
    app: node-docker-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-docker-app
  template:
    metadata:
      labels:
        app: node-docker-app
    spec:
      containers:
        - name: node-docker-app
          image: patnurkars1/node-docker-app:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: APP_NAME
              value: "Kubernetes Student"
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
